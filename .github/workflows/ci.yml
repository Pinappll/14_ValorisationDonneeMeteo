name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 bandit

      - name: Run linter (flake8)
        run: |
          cd backend
          flake8 . --max-line-length=120 --exclude=__pycache__ || true

      - name: Run tests
        run: |
          cd backend
          pytest --junitxml=test-report.xml --cov=. --cov-report=xml || true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/test-report.xml

      - name: Run security scan (Bandit)
        run: |
          cd backend
          bandit -r . -f json -o bandit-report.json || true

      - name: Upload security scan report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json

  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t meteo-backend:latest ./backend

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: meteo-backend:latest
          format: "json"
          output: "trivy-report.json"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag meteo-backend:latest ${{ secrets.DOCKERHUB_USERNAME }}/meteo-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/meteo-backend:latest
