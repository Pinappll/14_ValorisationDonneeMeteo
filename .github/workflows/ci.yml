name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: backend

    services:
      timescaledb:
        image: timescale/timescaledb:2.25.0-pg17
        env:
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
          POSTGRES_DB: meteodb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infoclimat -d meteodb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.0"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync --extra dev
          cp .env.example .env

      - name: Run linter (ruff)
        run: uv run ruff check .

      - name: Run unit tests
        run: |
          uv run pytest weather/tests/unit/ \
            --junitxml=pytest-unit-report.xml \
            -v

      - name: Run integration tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: meteodb
          DB_USER: infoclimat
          DB_PASSWORD: infoclimat2026
          MOCKED_DATA: "false"
        run: |
          uv run pytest weather/tests/integration/ \
            --junitxml=pytest-integration-report.xml \
            -v

      - name: Run dependency security scan (pip-audit)
        run: |
          uvx pip-audit -f json -o pip-audit-report.json || true

      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-reports
          path: |
            backend/pytest-unit-report.xml
            backend/pytest-integration-report.xml
            backend/pip-audit-report.json

  frontend:
    name: Frontend checks
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm run test:ci

      - name: Run linter (eslint)
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker-backend:
    name: Build and scan backend Docker image
    runs-on: ubuntu-24.04
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build backend Docker image
        run: |
          docker build \
            -t ghcr.io/${GITHUB_REPOSITORY,,}-backend:${GITHUB_SHA} \
            ./backend

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] \
            https://aquasecurity.github.io/trivy-repo/deb \
            $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Scan backend image with Trivy
        run: |
          trivy image \
            --format json \
            --output trivy-backend-report.json \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            ghcr.io/${GITHUB_REPOSITORY,,}-backend:${GITHUB_SHA}

      - name: Upload Docker scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-scan-report
          path: trivy-backend-report.json

  push-backend-image:
    name: Push backend image to GHCR
    runs-on: ubuntu-24.04
    needs: [docker-backend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build \
            -t ghcr.io/${GITHUB_REPOSITORY,,}-backend:${GITHUB_SHA} \
            -t ghcr.io/${GITHUB_REPOSITORY,,}-backend:latest \
            ./backend
          docker push ghcr.io/${GITHUB_REPOSITORY,,}-backend:${GITHUB_SHA}
          docker push ghcr.io/${GITHUB_REPOSITORY,,}-backend:latest

      - name: Upload VEX file
        uses: actions/upload-artifact@v4
        with:
          name: vex-file
          path: security/trivy.vex.json
